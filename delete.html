<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حذف السجلات</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; border: none; color: white; font-weight: bold; }
        .btn-delete { background: #d9534f; }
        .btn-back { background: #6c757d; }
    </style>
</head>
<body>

<div class="card">
    <h3>🗑️ حذف سجلات الحضور</h3>
    <label>من تاريخ:</label>
    <input type="date" id="dFrom">
    <label>إلى تاريخ:</label>
    <input type="date" id="dTo">
    <button id="btnDelete" class="btn-delete" onclick="prepareDeletion()">حذف السجلات في هذه الفترة</button>
    <button class="btn-back" onclick="window.location.href='index.html'">عودة للرئيسية</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    window.prepareDeletion = async () => {
        if(prompt("يرجى إدخال كلمة السر للمتابعة:") !== "1234") return alert("كلمة سر خاطئة!");
        
        const f = document.getElementById('dFrom').value;
        const t = document.getElementById('dTo').value;
        if(!f || !t) return alert("يرجى تحديد التاريخ من وإلى");

        const btn = document.getElementById('btnDelete');
        btn.disabled = true;
        btn.innerText = "جاري البحث والحذف...";

        const snap = await getDocs(collection(db, "attendance"));
        let batch = writeBatch(db), count = 0;
        
        snap.forEach(doc => {
            const d = doc.data();
            if(d.date >= f && d.date <= t) { batch.delete(doc.ref); count++; }
        });

        if(count > 0) {
            if(confirm(`سيتم حذف ${count} سجل. هل أنت متأكد؟`)) {
                await batch.commit();
                alert("تم حذف " + count + " سجل بنجاح.");
                location.reload();
            } else {
                btn.disabled = false;
                btn.innerText = "حذف السجلات في هذه الفترة";
            }
        } else {
            alert("لا توجد سجلات في هذا النطاق الزمني.");
            btn.disabled = false;
            btn.innerText = "حذف السجلات في هذه الفترة";
        }
    };
</script>
</body>
</html>
