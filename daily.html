<button onclick="printReport()" style="background:#28a745; color:white; padding:10px; border:none; width:100%; margin-top:10px;">طباعة التقرير (PDF)</button>

<script>
    // أضف هذه الدالة في قسم السكريبت
    window.printReport = () => {
        const date = document.getElementById('reportDate').value;
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html dir="rtl">
            <head>
                <title>تقرير الغيابات - ${date}</title>
                <style>
                    body { font-family: sans-serif; padding: 20px; }
                    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                    th, td { border: 1px solid #000; padding: 10px; text-align: center; }
                    h2 { text-align: center; }
                </style>
            </head>
            <body>
                <h2>تقرير الغيابات والإجازات ليوم ${date}</h2>
                ${document.getElementById('tableContainer').innerHTML}
            </body>
            </html>
        `);
        printWindow.document.close();
        printWindow.print();
    };
</script>
