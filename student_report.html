<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقرير الطالب التفصيلي</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #6f42c1; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h3>تقرير الطالب التفصيلي</h3>
        <div class="controls">
            <input type="text" id="studentName" placeholder="أدخل اسم الطالب الكامل...">
            <input type="date" id="dateFrom">
            <input type="date" id="dateTo">
            <button onclick="generateReport()" style="padding: 10px; background: #6f42c1; color: white; border: none; border-radius: 8px; cursor: pointer;">عرض التقرير</button>
        </div>
        
        <div id="summary" style="margin-bottom: 15px; font-weight: bold;"></div>
        
        <table>
            <thead><tr><th>التاريخ</th><th>الدرس</th><th>الحالة</th></tr></thead>
            <tbody id="reportBody"></tbody>
        </table>
    </div>

    <script>
        // إعدادات Firebase (نفس التي تستخدمها في باقي الصفحات)
        const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function generateReport() {
            const sName = document.getElementById('studentName').value;
            const dFrom = document.getElementById('dateFrom').value;
            const dTo = document.getElementById('dateTo').value;
            const body = document.getElementById('reportBody');
            const summary = document.getElementById('summary');
            
            body.innerHTML = "جاري البحث...";
            
            // 1. العثور على الطالب
            const studentsSnap = await db.collection("students").where("name", "==", sName).get();
            if(studentsSnap.empty) { body.innerHTML = "الطالب غير موجود!"; return; }
            const sId = studentsSnap.docs[0].id;

            // 2. جلب الحضور
            const attendSnap = await db.collection("attendance").get();
            let absencesCount = 0;
            let leavesCount = 0;
            let rows = "";

            attendSnap.forEach(doc => {
                const date = doc.id.split('_')[0];
                if(date >= dFrom && date <= dTo) {
                    const data = doc.data().data;
                    if(data[sId] && data[sId] !== "حاضر") {
                        if(data[sId] === "غائب") absencesCount++;
                        if(data[sId] === "مجاز") leavesCount++;
                        rows += `<tr><td>${date}</td><td>${doc.id.split('_')[3]}</td><td>${data[sId]}</td></tr>`;
                    }
                }
            });

            // 3. الحسابات
            const totalAbsenceDays = (absencesCount / 4).toFixed(2);
            const totalLeaveDays = (leavesCount / 4).toFixed(2);

            body.innerHTML = rows || "<tr><td colspan='3'>لا توجد سجلات في هذه الفترة</td></tr>";
            summary.innerHTML = `الغياب: ${totalAbsenceDays} يوم | الإجازات: ${totalLeaveDays} يوم`;
        }
    </script>
</body>
</html>
