<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلاب المتقدمة</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h3>إضافة طالب</h3>
    <input type="text" id="name" placeholder="اسم الطالب">
    <input type="text" id="birth" placeholder="التولد">
    <input type="text" id="idNum" placeholder="رقم القيد">
    <select id="class"><option>السادس العلمي</option><option>الخامس العلمي</option></select>
    <select id="section"><option>أ</option><option>ب</option><option>ج</option><option>د</option></select>
    <button onclick="saveStudent()">💾 حفظ الطالب</button>

    <hr>
    <h3>عرض الطلاب (فلترة)</h3>
    <select id="fClass" onchange="loadStudents()">
        <option value="">جميع الصفوف</option><option>السادس العلمي</option><option>الخامس العلمي</option>
    </select>
    <select id="fSection" onchange="loadStudents()">
        <option value="">جميع الشعب</option><option>أ</option><option>ب</option><option>ج</option><option>د</option>
    </select>

    <table border="1" width="100%">
        <thead><tr><th>الاسم</th><th>التولد</th><th>القيد</th><th>الصف/الشعبة</th></tr></thead>
        <tbody id="studentBody"></tbody>
    </table>

    <script>
        const db = firebase.firestore();

        window.saveStudent = () => {
            db.collection("students").add({
                name: document.getElementById('name').value,
                birth: document.getElementById('birth').value,
                id: document.getElementById('idNum').value,
                class: document.getElementById('class').value,
                section: document.getElementById('section').value
            }).then(() => { alert("تم الحفظ!"); loadStudents(); });
        };

        window.loadStudents = () => {
            const fClass = document.getElementById('fClass').value;
            const fSection = document.getElementById('fSection').value;
            let query = db.collection("students");
            
            if(fClass) query = query.where("class", "==", fClass);
            
            query.get().then(snap => {
                const body = document.getElementById('studentBody');
                body.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(!fSection || d.section == fSection) {
                        body.innerHTML += `<tr><td>${d.name}</td><td>${d.birth}</td><td>${d.id}</td><td>${d.class}/${d.section}</td></tr>`;
                    }
                });
            });
        };
        loadStudents();
    </script>
</body>
</html>
