<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقارير الحضور المتقدمة</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f8f9fa; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 10px; }
        input, button { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        .report-day { border-bottom: 1px solid #eee; padding: 10px 0; }
        .status-tag { padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
        .absent { background: #f8d7da; color: #721c24; }
        .excused { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="card">
    <h4>🔍 سجل غيابات الطالب</h4>
    <input type="text" id="studentName" placeholder="اسم الطالب بالكامل...">
    <div class="row">
        <div><label>من:</label><input type="date" id="startDate"></div>
        <div><label>إلى:</label><input type="date" id="endDate"></div>
    </div>
    <button onclick="getStudentReport()" style="background:#007bff; color:white; border:none; margin-top:10px;">استخراج السجل</button>
</div>

<div id="reportResult" class="card"></div>
<a href="index.html" style="display:block; text-align:center;">العودة للرئيسية</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8",
        projectId: "school-manager-d1865",
        appId: "1:752295259069:web:cb0824a579e714bb77c0d4"
    }));

    window.getStudentReport = async () => {
        const name = document.getElementById('studentName').value;
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const resDiv = document.getElementById('reportResult');
        
        resDiv.innerHTML = "جاري تجميع البيانات...";

        const q = query(collection(db, "attendance"), where("name", "==", name));
        const snap = await getDocs(q);
        
        let reportData = {};
        snap.forEach(d => {
            const data = d.data();
            // الفلترة بالتاريخ
            if ((!start || data.date >= start) && (!end || data.date <= end)) {
                if(data.status !== "حاضر") {
                    if(!reportData[data.date]) reportData[data.date] = [];
                    reportData[data.date].push(`${data.lesson}: ${data.status}`);
                }
            }
        });

        resDiv.innerHTML = `<h4>سجل الطالب: ${name}</h4>`;
        const sortedDates = Object.keys(reportData).sort();
        
        if (sortedDates.length === 0) {
            resDiv.innerHTML += "<p>لا توجد سجلات غياب في هذه الفترة.</p>";
        } else {
            sortedDates.forEach(date => {
                resDiv.innerHTML += `
                    <div class="report-day">
                        <strong>التاريخ: ${date}</strong><br>
                        ${reportData[date].map(item => `<span class="status-tag ${item.includes('غائب') ? 'absent' : 'excused'}">${item}</span>`).join(' ')}
                    </div>`;
            });
        }
    };
</script>
</body>
</html>
