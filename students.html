<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلاب</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <input type="text" id="name" placeholder="اسم الطالب">
    <button onclick="saveStudent()">حفظ الطالب</button>
    <div id="msg"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8",
            projectId: "school-manager-d1865"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function saveStudent() {
            const name = document.getElementById('name').value;
            db.collection("students").add({ name: name })
            .then(() => { alert("تم الحفظ بنجاح!"); })
            .catch((e) => { alert("خطأ: " + e.message); });
        }
    </script>
</body>
</html>
