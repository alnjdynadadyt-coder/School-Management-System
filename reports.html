<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقارير الحضور المتقدمة</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f8f9fa; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 10px; }
        select, input, button { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        .report-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; display: inline-block; }
        .absent { background: #f8d7da; color: #721c24; }
        .excused { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="card">
    <h4>📋 التقرير اليومي</h4>
    <input type="date" id="dailyDate">
    <button onclick="dailyReport()" style="background:#28a745; color:white;">عرض غيابات هذا اليوم</button>
</div>

<div class="card">
    <h4>🔍 سجل طالب محدد</h4>
    <select id="filterClass"><option>اختر الصف...</option></select>
    <select id="filterSection"><option>اختر الشعبة...</option></select>
    <select id="filterStudent"><option>اختر الطالب...</option></select>
    <div class="row">
        <div><label>من:</label><input type="date" id="start"></div>
        <div><label>إلى:</label><input type="date" id="end"></div>
    </div>
    <button onclick="studentReport()" style="background:#007bff; color:white;">عرض السجل</button>
</div>

<div id="reportResult" class="card"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ /* بيانات الـ config */ }));

    // 1. منطق التقرير اليومي (تجميع الطالب)
    window.dailyReport = async () => {
        const date = document.getElementById('dailyDate').value;
        const resDiv = document.getElementById('reportResult');
        const snap = await getDocs(query(collection(db, "attendance"), where("date", "==", date)));
        
        let daily = {};
        snap.forEach(d => {
            const data = d.data();
            if(data.status !== "حاضر") {
                if(!daily[data.name]) daily[data.name] = { class: data.class, status: [] };
                daily[data.name].status.push(`${data.lesson}: ${data.status}`);
            }
        });

        resDiv.innerHTML = `<h4>غيابات يوم ${date}</h4>`;
        for(let name in daily) {
            resDiv.innerHTML += `<div class="report-item"><strong>${name} (${daily[name].class})</strong> <div>${daily[name].status.map(s => `<span class="status-tag ${s.includes('غائب')?'absent':'excused'}">${s}</span>`).join('')}</div></div>`;
        }
    };

    // 2. منطق تقرير الطالب (مع الصف والشعبة)
    window.studentReport = async () => {
        const name = document.getElementById('filterStudent').value;
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;
        const resDiv = document.getElementById('reportResult');
        
        const snap = await getDocs(query(collection(db, "attendance"), where("name", "==", name)));
        resDiv.innerHTML = `<h4>سجل: ${name}</h4>`;
        
        let report = {};
        snap.forEach(d => {
            const data = d.data();
            if((!start || data.date >= start) && (!end || data.date <= end) && data.status !== "حاضر") {
                if(!report[data.date]) report[data.date] = { class: data.class, section: data.section, items: [] };
                report[data.date].items.push(`${data.lesson} | ${data.status}`);
            }
        });

        for(let date in report) {
            resDiv.innerHTML += `<div class="report-item">
                <strong>${date}</strong>
                <small>(${report[date].class} - ${report[date].section})</small>
                <div>${report[date].items.map(i => `<span class="status-tag ${i.includes('غائب')?'absent':'excused'}">${i}</span>`).join('')}</div>
            </div>`;
        }
    };
    
    // ملاحظة: ستحتاج لإضافة كود لجلب الصفوف والطلاب عند تحميل الصفحة (سأساعدك فيه لاحقاً)
</script>
</body>
</html>
