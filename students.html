<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلاب</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { padding: 8px; margin: 4px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        button { cursor: pointer; padding: 5px 10px; border: none; border-radius: 4px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="container">
    <h3>إضافة طالب</h3>
    <input type="text" id="name" placeholder="الاسم الرباعي">
    <select id="birth"><script>for(let i=2000; i<=2035; i++) document.write(`<option>${i}</option>`);</script></select>
    <input type="text" id="idNum" placeholder="رقم القيد">
    <select id="class"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option><option>الرابع الادبي</option><option>الخامس الادبي</option><option>السادس الادبي</option></select>
    <select id="section"><option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option><option>ز</option></select>
    <button id="saveBtn" onclick="saveStudent()" style="background:#28a745; color:white;">💾 حفظ</button>

    <hr>
    <table>
        <thead><tr><th>الاسم</th><th>التولد</th><th>القيد</th><th>الصف</th><th>الشعبة</th><th>إجراءات</th></tr></thead>
        <tbody id="studentBody"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    window.saveStudent = () => {
        const data = {
            name: document.getElementById('name').value,
            birth: document.getElementById('birth').value,
            id: document.getElementById('idNum').value,
            class: document.getElementById('class').value,
            section: document.getElementById('section').value
        };
        db.collection("students").add(data).then(() => { alert("تم الحفظ"); loadStudents(); });
    };

    window.loadStudents = () => {
        db.collection("students").get().then(snap => {
            const body = document.getElementById('studentBody'); body.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                body.innerHTML += `<tr><td>${d.name||''}</td><td>${d.birth||''}</td><td>${d.id||''}</td><td>${d.class||''}</td><td>${d.section||''}</td>
                <td><button onclick="deleteStudent('${doc.id}')" style="background:red; color:white;">🗑️</button></td></tr>`;
            });
        }).catch(err => alert("حدث خطأ في جلب البيانات: " + err));
    };

    window.deleteStudent = (id) => {
        if(prompt("كلمة المرور:") === "1234") db.collection("students").doc(id).delete().then(loadStudents);
    };

    loadStudents();
</script>
</body>
</html>
