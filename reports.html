<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقارير الشاملة</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 800px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table th, .table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h3>🔍 البحث في سجلات الحضور</h3>
    <input type="text" id="sClass" placeholder="أدخل الصف">
    <input type="text" id="sSection" placeholder="أدخل الشعبة">
    <button onclick="fetchReports()" style="background:#007bff; color:white;">استخراج التقرير</button>
    <button onclick="window.location.href='index.html'" style="background:#6c757d; color:white;">العودة للرئيسية</button>
</div>

<div id="result" class="card" style="margin-top:20px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    const clean = (val) => String(val || "").trim();

    window.fetchReports = async () => {
        const c = clean(document.getElementById('sClass').value);
        const s = clean(document.getElementById('sSection').value);
        const snap = await getDocs(collection(db, "attendance"));
        
        let html = `<table class="table"><tr><th>التاريخ</th><th>الطالب</th><th>الحالة</th></tr>`;
        snap.forEach(doc => {
            const d = doc.data();
            if(clean(d.class) === c && clean(d.section) === s) {
                html += `<tr><td>${d.date}</td><td>${d.name}</td><td>${d.status}</td></tr>`;
            }
        });
        document.getElementById('result').innerHTML = html + "</table>";
    };
</script>
</body>
</html>
