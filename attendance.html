<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور اليومي</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .btn-save { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <h3>سجل الحضور اليومي</h3>
        <div class="controls">
            <input type="date" id="datePicker">
            <select id="classSelect"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option></select>
            <select id="sectionSelect"><option>أ</option><option>ب</option><option>ج</option></select>
            <button onclick="loadStudentsForAttendance()">جلب الطلاب</button>
        </div>
        <table>
            <thead><tr><th>اسم الطالب</th><th>الحالة</th></tr></thead>
            <tbody id="attendanceBody"></tbody>
        </table>
        <button class="btn-save" id="saveAttendanceBtn" onclick="saveAttendance()" style="display:none;">حفظ الحضور</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // قفل الدخول بكلمة مرور للمدرس
        window.onload = () => {
            const pass = prompt("🔐 يرجى إدخال كلمة مرور المدرس:");
            if (pass !== "Teacher123") { alert("دخول مرفوض!"); window.location.href="index.html"; }
            document.getElementById('datePicker').valueAsDate = new Date();
        };

        window.loadStudentsForAttendance = () => {
            const cls = document.getElementById('classSelect').value;
            const sec = document.getElementById('sectionSelect').value;
            
            db.collection("students").where("class", "==", cls).where("section", "==", sec).get().then(snap => {
                const body = document.getElementById('attendanceBody'); body.innerHTML = "";
                snap.forEach(doc => {
                    body.innerHTML += `<tr><td>${doc.data().name}</td>
                    <td>
                        <select class="status">
                            <option value="حاضر">حاضر</option>
                            <option value="غائب">غائب</option>
                            <option value="مجاز">مجاز</option>
                        </select>
                    </td></tr>`;
                });
                document.getElementById('saveAttendanceBtn').style.display = "block";
            });
        };

        window.saveAttendance = () => {
            const date = document.getElementById('datePicker').value;
            const cls = document.getElementById('classSelect').value;
            const sec = document.getElementById('sectionSelect').value;
            
            // هنا سنرسل البيانات لجدول جديد يسمى 'attendance'
            alert("تم حفظ الحضور بنجاح!");
            document.getElementById('saveAttendanceBtn').style.display = "none";
        };
    </script>
</body>
</html>
