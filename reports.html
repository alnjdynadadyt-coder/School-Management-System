<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقرير الشامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        select, input, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #6f42c1; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h3>التقرير الشامل للطلاب</h3>
        <div class="controls">
            <select id="classSelect" onchange="loadSections()"><option value="">الصف</option></select>
            <select id="sectionSelect" onchange="loadStudents()"><option value="">الشعبة</option></select>
            <select id="studentSelect"><option value="all">الكل</option></select>
            <input type="date" id="dateFrom">
            <input type="date" id="dateTo">
            <button onclick="generateComprehensiveReport()" style="background: #6f42c1; color: white;">عرض التقرير</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>اسم الطالب</th>
                    <th>أيام غياب</th>
                    <th>دروس غياب</th>
                    <th>أيام إجازة</th>
                    <th>دروس إجازة</th>
                </tr>
            </thead>
            <tbody id="reportTableBody"></tbody>
        </table>
    </div>

    <script>
        const db = firebase.firestore();
        
        // جلب الصفوف (كما فعلنا سابقاً)
        db.collection("students").get().then(snap => {
            let classes = new Set();
            snap.forEach(doc => { if(doc.data().class) classes.add(doc.data().class); });
            const s = document.getElementById('classSelect');
            classes.forEach(c => s.innerHTML += `<option value="${c}">${c}</option>`);
        });

        // دوال loadSections و loadStudents (نفس المنطق السابق مع إضافة "الكل")
        function loadSections() { /* نفس المنطق السابق */ }
        function loadStudents() {
            const c = document.getElementById('classSelect').value;
            const sec = document.getElementById('sectionSelect').value;
            const stu = document.getElementById('studentSelect');
            stu.innerHTML = '<option value="all">الكل</option>';
            db.collection("students").where("class", "==", c).where("section", "==", sec).get().then(snap => {
                snap.forEach(doc => stu.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
            });
        }

        async function generateComprehensiveReport() {
            const dFrom = document.getElementById('dateFrom').value;
            const dTo = document.getElementById('dateTo').value;
            const stuId = document.getElementById('studentSelect').value;
            
            const attendSnap = await db.collection("attendance").get();
            let studentsData = {};

            attendSnap.forEach(doc => {
                const parts = doc.id.split('_');
                const d = parts[0];
                if(d >= dFrom && d <= dTo) {
                    const data = doc.data().data || {};
                    Object.keys(data).forEach(sId => {
                        if(stuId !== "all" && sId !== stuId) return;
                        if(!studentsData[sId]) studentsData[sId] = {absent: {}, leave: {}};
                        
                        let status = data[sId];
                        if(status === "غائب" || status === "مجاز") {
                            let type = status === "غائب" ? "absent" : "leave";
                            if(!studentsData[sId][type][d]) studentsData[sId][type][d] = 0;
                            studentsData[sId][type][d]++;
                        }
                    });
                }
            });

            // هنا سنطبق معادلة الـ 4 دروس
            let html = "";
            for(let sId in studentsData) {
                let absDays = 0, absLessons = 0, leaveDays = 0, leaveLessons = 0;
                
                ["absent", "leave"].forEach(type => {
                    for(let d in studentsData[sId][type]) {
                        let count = studentsData[sId][type][d];
                        if(type === "absent") {
                            absDays += Math.floor(count / 4);
                            absLessons += (count % 4);
                        } else {
                            leaveDays += Math.floor(count / 4);
                            leaveLessons += (count % 4);
                        }
                    }
                });
                
                html += `<tr><td>${sId}</td><td>${absDays}</td><td>${absLessons}</td><td>${leaveDays}</td><td>${leaveLessons}</td></tr>`;
            }
            document.getElementById('reportTableBody').innerHTML = html;
        }
    </script>
</body>
</html>
