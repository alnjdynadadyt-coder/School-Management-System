<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8",
        projectId: "school-manager-d1865",
        appId: "1:752295259069:web:cb0824a579e714bb77c0d4"
    }));

    async function wipeDatabase() {
        if(!confirm("⚠️ هل أنت متأكد من حذف جميع سجلات الحضور؟")) return;
        const snap = await getDocs(collection(db, "attendance"));
        snap.forEach(async (d) => await deleteDoc(doc(db, "attendance", d.id)));
        alert("تم مسح السجلات بنجاح! يمكنك الآن إضافة الكود الجديد.");
    }
    wipeDatabase();
</script>
