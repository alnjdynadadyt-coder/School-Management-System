<script>
    const db = firebase.firestore();

    // 1. تهيئة التاريخ فور تحميل الصفحة
    window.onload = function() {
        const dateInput = document.getElementById('dateFilter');
        if (!dateInput.value) {
            dateInput.valueAsDate = new Date();
            loadReport(); // استدعاء الدالة لجلب البيانات مباشرة
        }
    };

    async function loadReport() {
        const date = document.getElementById('dateFilter').value;
        const body = document.getElementById('reportBody');
        const reportTitle = document.getElementById('reportTitle');
        
        // التحقق من وجود التاريخ
        if(!date) return;

        body.innerHTML = "<tr><td colspan='3'>جاري جلب البيانات...</td></tr>";
        
        // تحويل التاريخ لاسم يوم
        const dayName = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"][new Date(date).getDay()];
        if(reportTitle) reportTitle.innerText = `تقرير الغيابات ليوم ${dayName} (${date})`;

        try {
            // جلب البيانات من Firestore
            const snapshot = await db.collection("attendance").get();
            const studentsSnap = await db.collection("students").get();
            const students = {};
            studentsSnap.forEach(doc => students[doc.id] = doc.data().name);

            let reportData = {};

            snapshot.forEach(doc => {
                // التأكد من أن معرف الوثيقة يحتوي على التاريخ المختار
                if(doc.id.includes(date)) {
                    const data = doc.data().data;
                    const parts = doc.id.split('_'); 
                    for(let sId in data) {
                        if(data[sId] !== "حاضر") {
                            if(!reportData[sId]) {
                                reportData[sId] = { 
                                    name: students[sId] || sId, 
                                    class: `${parts[1]} - ${parts[2]}`, 
                                    absences: [] 
                                };
                            }
                            let lessonShort = parts[3].replace("الدرس ", "");
                            reportData[sId].absences.push(`${lessonShort} <span class="${data[sId] === 'غائب' ? 'absent' : 'leave'}">${data[sId]}</span>`);
                        }
                    }
                }
            });

            // عرض البيانات
            body.innerHTML = "";
            const sortedKeys = Object.keys(reportData).sort();
            
            if(sortedKeys.length === 0) {
                body.innerHTML = "<tr><td colspan='3'>لا توجد غيابات لهذا التاريخ</td></tr>";
            } else {
                sortedKeys.forEach(id => {
                    let s = reportData[id];
                    body.innerHTML += `<tr><td>${s.name}</td><td>${s.class}</td><td>${s.absences.join(' | ')}</td></tr>`;
                });
            }
        } catch(e) {
            console.error(e);
            body.innerHTML = "<tr><td colspan='3'>حدث خطأ أثناء تحميل البيانات</td></tr>";
        }
    }
</script>
