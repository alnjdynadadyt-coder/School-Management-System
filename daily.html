<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقرير التلقائي الشامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th, .table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h3>📊 التقرير التلقائي (لكل البيانات)</h3>
    <button onclick="fetchAllData()">تحميل وعرض جميع البيانات تلقائياً</button>
    <button onclick="window.print()">طباعة التقرير</button>
</div>

<div class="card" id="resultArea">
    <div id="tableContainer"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    window.fetchAllData = async () => {
        const snap = await getDocs(collection(db, "attendance"));
        let report = {};
        
        snap.forEach(doc => {
            const d = doc.data();
            // المفتاح هو دمج (التاريخ + اسم الطالب) لنضمن فرادة السجل
            const key = `${d.date}_${d.name}`;
            if(!report[key]) {
                report[key] = {date: d.date, name: d.name, cls: d.class, sec: d.section, lessons: {}};
            }
            report[key].lessons[d.lesson] = d.status;
        });

        let html = `<table class="table" id="reportTable"><tr><th>التاريخ</th><th>الطالب</th><th>الصف</th><th>الشعبة</th>`;
        for(let i=1; i<=6; i++) html += `<th>د ${i}</th>`;
        html += `</tr>`;

        for(let key in report) {
            let r = report[key];
            html += `<tr><td>${r.date}</td><td>${r.name}</td><td>${r.cls}</td><td>${r.sec}</td>`;
            for(let i=1; i<=6; i++) {
                let status = r.lessons[`الدرس ${i}`] || "";
                html += `<td>${status === "غائب" ? "غ" : (status === "مجاز" ? "م" : "")}</td>`;
            }
            html += `</tr>`;
        }
        document.getElementById('tableContainer').innerHTML = html + "</table>";
    };
</script>
</body>
</html>
