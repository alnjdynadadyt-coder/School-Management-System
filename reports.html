<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام التقارير الجديد</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        button { cursor: pointer; border: none; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h3>1. الحذف المشروط (آمن)</h3>
    <input type="date" id="dFrom"> <input type="date" id="dTo">
    <input type="text" id="dClass" placeholder="الصف (مطابق للبيانات)">
    <input type="text" id="dSection" placeholder="الشعبة">
    <button onclick="executeDelete()" style="background:#dc3545; color:white;">حذف السجلات المطابقة</button>
</div>

<div class="box">
    <h3>2. تقرير اليوم (الغياب والإجازات)</h3>
    <input type="date" id="dailyDate">
    <button onclick="generateDailyReport()" style="background:#28a745; color:white;">عرض التقرير المجمع</button>
</div>

<div id="output" class="box"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    // تعيين تاريخ اليوم تلقائياً
    document.getElementById('dailyDate').value = new Date().toISOString().split('T')[0];

    window.executeDelete = async () => {
        const f = document.getElementById('dFrom').value, t = document.getElementById('dTo').value;
        const c = document.getElementById('dClass').value.trim(), s = document.getElementById('dSection').value.trim();
        const snap = await getDocs(collection(db, "attendance"));
        let batch = writeBatch(db), count = 0;
        snap.forEach(doc => {
            const d = doc.data();
            // مطابقة نصية صارمة لكن بدون مسافات
            if (d.date >= f && d.date <= t && String(d.class||'').trim() === c && String(d.section||'').trim() === s) {
                batch.delete(doc.ref); count++;
            }
        });
        if(count > 0 && confirm(`تم العثور على ${count} سجل. هل تحذفها؟`)) { await batch.commit(); alert("تم الحذف"); }
        else alert("لم يتم العثور على سجلات. تأكد من تطابق الصف والشعبة حرفياً!");
    };

    window.generateDailyReport = async () => {
        const date = document.getElementById('dailyDate').value;
        const snap = await getDocs(collection(db, "attendance"));
        let report = {};
        snap.forEach(doc => {
            const d = doc.data();
            if (d.date === date && (d.status === "غائب" || d.status === "إجازة")) {
                if(!report[d.name]) report[d.name] = {cls: d.class, sec: d.section, lessons: []};
                report[d.name].lessons.push(d.lesson + "(" + d.status + ")");
            }
        });
        let h = "<table><tr><th>الطالب</th><th>الصف/الشعبة</th><th>الحصص</th></tr>";
        for(let n in report) h += `<tr><td>${n}</td><td>${report[n].cls}/${report[n].sec}</td><td>${report[n].lessons.join(', ')}</td></tr>`;
        document.getElementById('output').innerHTML = h + "</table>";
    };
</script>
</body>
</html>
