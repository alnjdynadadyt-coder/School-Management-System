<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلاب الاحترافية</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; background: #28a745; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        #importArea { display: none; margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 10px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="container">
        <a href="index.html">⬅️ العودة للرئيسية</a>
        <h3>إدارة بيانات الطلاب</h3>
        
        <button onclick="document.getElementById('importArea').style.display='block'">📥 استيراد أسماء من الورد</button>
        
        <div id="importArea">
            <textarea id="pasteArea" style="width:100%; height:100px;" placeholder="الصق هنا الأسماء المنسوخة من ملف الورد (كل طالب في سطر)..."></textarea>
            <button onclick="importStudents()" style="background:#007bff;">بدء الاستيراد</button>
        </div>

        <hr>
        <table id="studentsTable">
            <thead><tr><th>الاسم</th><th>التولد</th><th>القيد</th><th>الصف/الشعبة</th><th>إجراءات</th></tr></thead>
            <tbody id="studentBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // دالة استيراد البيانات
        window.importStudents = () => {
            const text = document.getElementById('pasteArea').value;
            const lines = text.split('\n');
            lines.forEach(line => {
                const parts = line.split('\t'); // الورد غالباً يستخدم Tab للفصل
                if(parts.length >= 3) {
                    const data = { name: parts[0], birth: parts[1], id: parts[2], class: "السادس العلمي", section: "د" };
                    db.collection("students").add(data);
                }
            });
            alert("تم إرسال البيانات للاستيراد!");
            loadStudents();
        };

        window.loadStudents = () => {
            db.collection("students").get().then(snap => {
                const body = document.getElementById('studentBody'); body.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    body.innerHTML += `<tr><td>${d.name||''}</td><td>${d.birth||''}</td><td>${d.id||''}</td><td>${d.class||''}</td><td><button onclick="secureDelete('${doc.id}')">🗑️</button></td></tr>`;
                });
            });
        };

        window.secureDelete = (id) => {
            if(prompt("كلمة المرور:") === "1234") db.collection("students").doc(id).delete().then(loadStudents);
        };
        
        loadStudents();
    </script>
</body>
</html>
