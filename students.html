<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلاب المستقرة</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { padding: 8px; margin: 4px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        button { cursor: pointer; padding: 5px 10px; border: none; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <h3>إضافة طالب</h3>
    <input type="text" id="name" placeholder="الاسم الرباعي">
    <input type="text" id="idNum" placeholder="رقم القيد">
    <select id="class"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option></select>
    <select id="section"><option>أ</option><option>ب</option><option>ج</option><option>د</option></select>
    <button onclick="saveStudent()" style="background:#28a745; color:white;">💾 حفظ</button>

    <hr>
    <h3>فلترة دقيقة</h3>
    <input type="text" id="searchName" onkeyup="filterData()" placeholder="بحث بالاسم...">
    <select id="filterClass" onchange="filterData()"><option value="">كل الصفوف</option><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option></select>
    <select id="filterSection" onchange="filterData()"><option value="">كل الشعب</option><option>أ</option><option>ب</option><option>ج</option><option>د</option></select>

    <table>
        <thead><tr><th>الاسم</th><th>القيد</th><th>الصف</th><th>الشعبة</th><th>إجراءات</th></tr></thead>
        <tbody id="studentBody"></tbody>
    </table>
</div>

<script>
    // ... (تأكد من وجود تهيئة Firebase هنا) ...
    
    // دالة الحفظ الجديدة
    window.saveStudent = () => {
        const data = {
            name: document.getElementById('name').value,
            id: document.getElementById('idNum').value,
            class: document.getElementById('class').value,
            section: document.getElementById('section').value
        };
        db.collection("students").add(data).then(() => { loadStudents(); alert("تم الحفظ"); });
    };

    // دالة العرض والفلترة الدقيقة
    window.filterData = () => {
        const n = document.getElementById('searchName').value.toLowerCase();
        const c = document.getElementById('filterClass').value;
        const s = document.getElementById('filterSection').value;
        
        db.collection("students").get().then(snap => {
            const body = document.getElementById('studentBody'); body.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                // شرط الفلترة الدقيق
                if(d.name.toLowerCase().includes(n) && (c === "" || d.class === c) && (s === "" || d.section === s)) {
                    body.innerHTML += `<tr><td>${d.name}</td><td>${d.id}</td><td>${d.class}</td><td>${d.section}</td>
                    <td><button onclick="deleteStudent('${doc.id}')" style="background:red; color:white;">🗑️</button></td></tr>`;
                }
            });
        });
    };
    loadStudents();
</script>
</body>
</html>
