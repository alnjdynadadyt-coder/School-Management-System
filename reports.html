<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة التقارير</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
<button onclick="window.location.href='index.html'">⬅ العودة للرئيسية</button>
<div class="card">
    <h4>⚠️ الحذف (تأكد من اختيار الصف والشعبة بدقة)</h4>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
        <input type="date" id="delFrom"><input type="date" id="delTo">
        <select id="delClass"><option value="">الصف...</option></select>
        <select id="delSection"><option value="">الشعبة...</option></select>
    </div>
    <button onclick="clearAllData()" style="background:#dc3545; color:white; width:100%; padding:10px; margin-top:5px;">تنفيذ الحذف</button>
</div>
<div class="card">
    <h4>📋 تقرير اليوم (الغياب + المجازين)</h4>
    <input type="date" id="dailyDate">
    <button onclick="fetchDailyTable()" style="background:#28a745; color:white; width:100%; padding:10px;">عرض التقرير</button>
</div>
<div id="res" class="card"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    document.getElementById('dailyDate').value = new Date().toISOString().split('T')[0];
    
    async function loadClasses() {
        const snap = await getDocs(collection(db, "students"));
        let classes = [...new Set(snap.docs.map(d => d.data().class))].sort();
        classes.forEach(c => {
            document.getElementById('delClass').innerHTML += `<option value="${c}">${c}</option>`;
        });
    }
    loadClasses();

    document.getElementById('delClass').onchange = async () => {
        const cls = document.getElementById('delClass').value;
        const snap = await getDocs(collection(db, "students"));
        const secs = [...new Set(snap.docs.filter(d => d.data().class == cls).map(d => d.data().section))].sort();
        document.getElementById('delSection').innerHTML = '<option value="">الشعبة...</option>';
        secs.forEach(s => document.getElementById('delSection').innerHTML += `<option value="${s}">${s}</option>`);
    };

    window.clearAllData = async () => {
        if (prompt("أدخل كلمة المرور:") !== "1234") return alert("خطأ!");
        const from = document.getElementById('delFrom').value, to = document.getElementById('delTo').value;
        const cls = document.getElementById('delClass').value, sec = document.getElementById('delSection').value;
        const snap = await getDocs(collection(db, "attendance"));
        const batch = writeBatch(db);
        let count = 0;
        snap.forEach(d => {
            const data = d.data();
            // مطابقة فضفاضة جداً لتجاوز أي مشاكل نصية
            if(data.date >= from && data.date <= to && String(data.class||'').trim() == cls.trim() && String(data.section||'').trim() == sec.trim()) {
                batch.delete(d.ref); count++;
            }
        });
        if(count > 0 && confirm(`تم العثور على ${count} سجل. حذف؟`)) { await batch.commit(); alert("تم الحذف"); location.reload(); }
        else alert("لا توجد سجلات تطابق هذه المعايير (جرب تغيير الصف/الشعبة).");
    };

    window.fetchDailyTable = async () => {
        const date = document.getElementById('dailyDate').value;
        const snap = await getDocs(collection(db, "attendance"));
        let html = `<h4>تقرير ${date}</h4><table class="report-table"><tr><th>الطالب</th><th>الحالة</th></tr>`;
        snap.forEach(d => {
            const data = d.data();
            if(data.date === date && (data.status === "غائب" || data.status === "إجازة")) {
                html += `<tr><td>${data.name} <br><small>(${data.class||''} - ${data.section||''})</small></td><td>${data.status}</td></tr>`;
            }
        });
        document.getElementById('res').innerHTML = html + `</table>`;
    };
</script>
</body>
</html>
