<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة التقارير</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        select, input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<button onclick="window.location.href='index.html'">⬅ العودة للرئيسية</button>

<div class="card" style="border: 2px solid #dc3545;">
    <h4>⚠️ حذف سجلات</h4>
    <div class="grid-row"><input type="date" id="delFrom"><input type="date" id="delTo"></div>
    <div class="grid-row"><select id="delClass"><option value="">الصف...</option></select><select id="delSection"><option value="">الشعبة...</option></select></div>
    <button onclick="clearAllData()" style="background:#dc3545; color:white;">تنفيذ الحذف</button>
</div>

<div class="card">
    <h4>📋 تقرير الغياب (يومي)</h4>
    <input type="date" id="dailyDate">
    <button onclick="fetchDailyTable()" style="background:#28a745; color:white;">عرض الغياب مجمعاً</button>
</div>

<div class="card">
    <h4>🔍 تقرير شامل</h4>
    <select id="sClass" onchange="updateSections()"><option value="">الصف...</option></select>
    <select id="sSection"><option value="">الشعبة...</option></select>
    <div class="grid-row"><input type="date" id="dateFrom"><input type="date" id="dateTo"></div>
    <button onclick="fetchReports()" style="background:#007bff; color:white;">استخراج التقرير</button>
</div>

<div id="res" class="card"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    document.getElementById('dailyDate').value = new Date().toISOString().split('T')[0];
    let allStudents = [];

    async function init() {
        const snap = await getDocs(collection(db, "students"));
        allStudents = snap.docs.map(d => d.data());
        let classes = [...new Set(allStudents.map(s => s.class))].sort();
        classes.forEach(c => {
            document.getElementById('sClass').innerHTML += `<option value="${c}">${c}</option>`;
            document.getElementById('delClass').innerHTML += `<option value="${c}">${c}</option>`;
        });
    }
    init();

    window.updateSections = () => {
        const cls = document.getElementById('sClass').value;
        const secs = [...new Set(allStudents.filter(s => s.class === cls).map(s => s.section))].sort();
        const ss = document.getElementById('sSection');
        ss.innerHTML = '<option value="">اختر الشعبة...</option>';
        secs.forEach(s => ss.innerHTML += `<option value="${s}">${s}</option>`);
    };

    document.getElementById('delClass').onchange = () => {
        const cls = document.getElementById('delClass').value;
        const secs = [...new Set(allStudents.filter(s => s.class === cls).map(s => s.section))].sort();
        const ds = document.getElementById('delSection');
        ds.innerHTML = '<option value="">اختر الشعبة...</option>';
        secs.forEach(s => ds.innerHTML += `<option value="${s}">${s}</option>`);
    };

    window.clearAllData = async () => {
        if (prompt("كلمة المرور:") !== "1234") return alert("خطأ!");
        const from = document.getElementById('delFrom').value, to = document.getElementById('delTo').value;
        const cls = document.getElementById('delClass').value, sec = document.getElementById('delSection').value;
        const snap = await getDocs(collection(db, "attendance"));
        const batch = writeBatch(db);
        let count = 0;
        snap.forEach(d => {
            const data = d.data();
            // مطابقة مرنة
            if(data.date >= from && data.date <= to && String(data.class||'').trim() == cls.trim() && String(data.section||'').trim() == sec.trim()) {
                batch.delete(d.ref); count++;
            }
        });
        if(count > 0 && confirm(`تم العثور على ${count} سجل. هل تريد الحذف؟`)) { await batch.commit(); location.reload(); }
        else alert("لم يتم العثور على سجلات تطابق التاريخ والصف بدقة.");
    };

    window.fetchDailyTable = async () => {
        const date = document.getElementById('dailyDate').value;
        const snap = await getDocs(collection(db, "attendance"));
        let report = {};
        snap.forEach(d => {
            const data = d.data();
            if(data.date === date && (data.status === "غائب" || data.status === "إجازة")) {
                if(!report[data.name]) report[data.name] = [];
                report[data.name].push(data.lesson || "بدون مادة");
            }
        });
        let html = `<h4>تقرير ${date}</h4><table class="report-table"><tr><th>الطالب</th><th>الحصص الغائب عنها</th></tr>`;
        for(let name in report) { html += `<tr><td>${name}</td><td>${report[name].join(', ')}</td></tr>`; }
        document.getElementById('res').innerHTML = html + `</table>`;
    };

    window.fetchReports = async () => {
        const cls = document.getElementById('sClass').value, sec = document.getElementById('sSection').value;
        const dFrom = document.getElementById('dateFrom').value, dTo = document.getElementById('dateTo').value;
        const snap = await getDocs(collection(db, "attendance"));
        let html = `<h4>التقرير الشامل</h4><table class="report-table"><tr><th>التاريخ</th><th>الطالب</th><th>الحالة</th></tr>`;
        snap.forEach(d => {
            const data = d.data();
            if(String(data.class||'').trim() == cls.trim() && String(data.section||'').trim() == sec.trim() && data.date >= dFrom && data.date <= dTo) {
                html += `<tr><td>${data.date}</td><td>${data.name}</td><td>${data.status}</td></tr>`;
            }
        });
        document.getElementById('res').innerHTML = html + `</table>`;
    };
</script>
</body>
</html>
