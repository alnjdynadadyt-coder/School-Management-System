<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3>بيانات الدرس</h3>
    <input type="date" id="date">
    
    <select id="subject">
        <option value="">اختر المادة</option>
        <option>الاسلامية</option><option>العربي</option><option>الانكليزي</option>
        <option>الرياضيات</option><option>الفيزياء</option><option>الكيمياء</option>
        <option>الاحياء</option><option>الحاسوب</option><option>الجغرافية</option>
        <option>التاريخ</option><option>الاجتماع</option><option>الفلسفة</option>
        <option>الاقتصاد</option><option>الجرائم</option><option>الرياضة</option>
        <option>الفنية</option><option>أخرى</option>
    </select>

    <select id="lesson">
        <option>الدرس الأول</option><option>الثاني</option><option>الثالث</option>
        <option>الرابع</option><option>الخامس</option><option>السادس</option><option>السابع</option>
    </select>

    <select id="fClass">
        <option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option>
        <option>الرابع الادبي</option><option>الخامس الادبي</option><option>السادس الادبي</option>
    </select>

    <select id="fSection">
        <option>أ</option><option>ب</option><option>ج</option><option>د</option><option>هـ</option><option>و</option><option>ز</option>
    </select>

    <button onclick="alert('سنتصل بقاعدة البيانات في الخطوة القادمة')">جلب قائمة الطلاب</button>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();
</script>
</body>
</html>
