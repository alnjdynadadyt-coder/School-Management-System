<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #eee; }
        .card { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        select, input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        .student-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h3>بيانات الدرس</h3>
    <input type="date" id="datePicker">
    <select id="subject"><option>الكيمياء</option><option>الفيزياء</option><option>الأحياء</option><option>الفنية</option></select>
    <select id="lesson"><option>الدرس الأول</option><option>الدرس الثاني</option></select>
    <select id="fClass"><option>الرابع العلمي</option><option>السادس العلمي</option></select>
    <select id="fSection"><option>أ</option><option>ب</option></select>
    <button onclick="loadList()" style="width:100%; padding:10px; background:#007bff; color:white; border:none;">جلب قائمة الطلاب</button>
</div>

<div class="card" id="list"></div>

<script type="module">
    // تعيين التاريخ تلقائياً
    document.getElementById('datePicker').valueAsDate = new Date();
    
    // سأنتظر منك إخباري عندما تقوم بحفظ هذا الكود بنجاح، ولن ننتقل للخطوة التالية إلا بعد أن تتأكد أن هذه الصفحة تعمل وتظهر لك القوائم بشكل صحيح.
</script>
</body>
</html>
