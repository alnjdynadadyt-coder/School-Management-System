<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقرير اليومي المجمع</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: #6c757d; color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-btn:hover { background: #5a6268; }
        
        h3 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        #dateLabel { text-align: center; color: #7f8c8d; font-size: 16px; margin-bottom: 20px; }
        
        .controls { display: flex; justify-content: center; margin-bottom: 20px; }
        input[type="date"] { padding: 10px; border-radius: 8px; border: 1px solid #ced4da; font-size: 16px; cursor: pointer; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; border: 1px solid #dee2e6; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #dee2e6; }
        th { background: #343a40; color: white; font-weight: 600; }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        .btn-print { background: #28a745; color: white; padding: 12px 30px; border: none; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-print:hover { background: #218838; }

        @media print { 
            .btn-print, .controls, .back-btn { display: none !important; } 
            body { background: white; } 
            .container { box-shadow: none; padding: 0; }
            h3 { color: black; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <a href="index.html" class="back-btn">⬅️ العودة للرئيسية</a>
            <div></div> </div>
        
        <h3>تقرير الغيابات والإجازات اليومي</h3>
        <div id="dateLabel"></div>

        <div class="controls">
            <input type="date" id="dateFilter" onchange="loadReport()">
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>اسم الطالب</th>
                    <th>الصف/الشعبة</th>
                    <th>تفاصيل الغياب/الإجازة</th>
                </tr>
            </thead>
            <tbody id="reportBody"></tbody>
        </table>
        <button class="btn-print" onclick="window.print()">🖨️ طباعة التقرير</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('dateFilter').valueAsDate = new Date();

        async function loadReport() {
            const date = document.getElementById('dateFilter').value;
            const body = document.getElementById('reportBody');
            const dateLabel = document.getElementById('dateLabel');
            
            // إضافة اسم اليوم وتحديث العنوان
            const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
            const dayName = days[new Date(date).getDay()];
            dateLabel.innerHTML = `<strong>${dayName}</strong> - التاريخ: ${date}`;
            
            body.innerHTML = "<tr><td colspan='3'>جاري جلب البيانات...</td></tr>";

            try {
                const [studentsSnap, attendSnap] = await Promise.all([
                    db.collection("students").get(),
                    db.collection("attendance").get()
                ]);

                const students = {};
                studentsSnap.forEach(doc => students[doc.id] = doc.data().name);

                let reportData = {};

                attendSnap.forEach(doc => {
                    if(doc.id.startsWith(date)) {
                        const data = doc.data().data;
                        const parts = doc.id.split('_'); 
                        const classSection = `${parts[1]} - ${parts[2]}`;

                        for(let studentId in data) {
                            if(data[studentId] !== "حاضر") {
                                if(!reportData[studentId]) {
                                    reportData[studentId] = { 
                                        name: students[studentId] || "طالب غير معروف", 
                                        class: classSection, 
                                        absences: [] 
                                    };
                                }
                                const lesson = parts[3].replace("الدرس ", "");
                                reportData[studentId].absences.push(`${lesson} (${data[studentId]})`);
                            }
                        }
                    }
                });

                body.innerHTML = "";
                const sortedKeys = Object.keys(reportData).sort((a, b) => 
                    reportData[a].name.localeCompare(reportData[b].name)
                );
                
                if(sortedKeys.length === 0) {
                    body.innerHTML = "<tr><td colspan='3'>لا توجد غيابات مسجلة لهذا اليوم</td></tr>";
                } else {
                    sortedKeys.forEach(id => {
                        let s = reportData[id];
                        body.innerHTML += `<tr><td>${s.class}</td><td>${s.name}</td><td>${s.absences.join(' | ')}</td></tr>`;
                    });
                }
            } catch(e) {
                body.innerHTML = "<tr><td colspan='3'>خطأ: تأكد من اتصال الإنترنت</td></tr>";
            }
        }
        loadReport();
    </script>
</body>
</html>
