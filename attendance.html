<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور اليومي</title>
    <style>
        .student-row { padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .status-btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; }
        .present { background: #d4edda; color: #155724; } /* حاضر */
        .absent { background: #f8d7da; color: #721c24; } /* غائب */
        .excused { background: #fff3cd; color: #856404; } /* مجاز */
    </style>
</head>
<body>

<div class="card">
    <h3>تسجيل حضور الدرس</h3>
    <select id="lesson">
        <option>الدرس الأول</option><option>الدرس الثاني</option><option>الدرس الثالث</option>
        <option>الدرس الرابع</option><option>الدرس الخامس</option><option>الدرس السادس</option>
    </select>
    <input type="text" id="subject" placeholder="اسم المادة">
    <button onclick="loadStudentsForAttendance()">عرض الطلاب</button>
</div>

<div id="attendanceList"></div>

<script>
    // سنقوم هنا ببرمجة دالة تغيير الحالة عند النقر
    function toggleStatus(btn) {
        if (btn.classList.contains('present')) {
            btn.className = 'status-btn absent'; btn.innerText = 'غائب';
        } else if (btn.classList.contains('absent')) {
            btn.className = 'status-btn excused'; btn.innerText = 'مجاز';
        } else {
            btn.className = 'status-btn present'; btn.innerText = 'حاضر';
        }
    }
</script>
</body>
</html>
