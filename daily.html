<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقرير اليومي المجمع</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h3 { text-align: center; color: #333; }
        .controls { display: flex; justify-content: center; margin-bottom: 20px; }
        input[type="date"] { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; }
        th { background: #343a40; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
        .btn-print { background: #28a745; color: white; padding: 12px 30px; border: none; border-radius: 8px; width: 100%; font-size: 18px; cursor: pointer; margin-top: 20px; }
        @media print { .btn-print, .controls { display: none; } body { background: white; } .container { box-shadow: none; } }
    </style>
</head>
<body>
    <div class="container">
        <h3>تقرير الغيابات والإجازات اليومي</h3>
        <div class="controls">
            <input type="date" id="dateFilter" onchange="loadReport()">
        </div>
        <table>
            <thead><tr><th>الصف/الشعبة</th><th>اسم الطالب</th><th>تفاصيل الغياب/الإجازة</th></tr></thead>
            <tbody id="reportBody"></tbody>
        </table>
        <button class="btn-print" onclick="window.print()">🖨️ طباعة التقرير</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('dateFilter').valueAsDate = new Date();

        async function loadReport() {
            const date = document.getElementById('dateFilter').value;
            const body = document.getElementById('reportBody');
            body.innerHTML = "<tr><td colspan='3'>جاري جلب البيانات...</td></tr>";

            try {
                // جلب الطلاب والحضور معاً
                const [studentsSnap, attendSnap] = await Promise.all([
                    db.collection("students").get(),
                    db.collection("attendance").get()
                ]);

                const students = {};
                studentsSnap.forEach(doc => students[doc.id] = doc.data().name);

                let reportData = {};

                attendSnap.forEach(doc => {
                    if(doc.id.startsWith(date)) {
                        const data = doc.data().data;
                        const parts = doc.id.split('_'); 
                        const classSection = `${parts[1]} - ${parts[2]}`;

                        for(let studentId in data) {
                            if(data[studentId] !== "حاضر") {
                                if(!reportData[studentId]) {
                                    // الربط باسم الطالب، وإذا لم يوجد نضع المعرف الأصلي
                                    reportData[studentId] = { 
                                        name: students[studentId] || studentId, 
                                        class: classSection, 
                                        absences: [] 
                                    };
                                }
                                // اختصار "الدرس"
                                const lesson = parts[3].replace("الدرس ", "");
                                reportData[studentId].absences.push(`${lesson} (${data[studentId]})`);
                            }
                        }
                    }
                });

                body.innerHTML = "";
                const sortedKeys = Object.keys(reportData).sort((a, b) => 
                    reportData[a].name.localeCompare(reportData[b].name)
                );
                
                if(sortedKeys.length === 0) {
                    body.innerHTML = "<tr><td colspan='3'>لا توجد غيابات لهذا اليوم</td></tr>";
                } else {
                    sortedKeys.forEach(id => {
                        let s = reportData[id];
                        body.innerHTML += `<tr><td>${s.class}</td><td>${s.name}</td><td>${s.absences.join(' | ')}</td></tr>`;
                    });
                }
            } catch(e) {
                body.innerHTML = "<tr><td colspan='3'>خطأ: تأكد من اتصال الإنترنت</td></tr>";
            }
        }
        loadReport();
    </script>
</body>
</html>
