<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة الطلاب المتقدمة</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; color: white; background: #007bff; }
    </style>
</head>
<body>

<div class="card">
    <h3>📥 استيراد الطلاب من Word (انسخ الجدول والصقه هنا)</h3>
    <textarea id="importArea" placeholder="قم بلصق بيانات الطلاب هنا..."></textarea>
    <button onclick="importData()">تحليل واستيراد البيانات</button>
</div>

<div class="card">
    <h3>📋 قائمة الطلاب</h3>
    <table id="studentTable">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>التولد</th>
                <th>رقم القيد</th>
                <th>الصف/الشعبة</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="studentBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ /* ضع بيانات الـ config هنا */ }));

    // دالة الاستيراد الذكي
    window.importData = async () => {
        const text = document.getElementById('importArea').value;
        const lines = text.split('\n');
        for (let line of lines) {
            const cols = line.split('\t'); // افتراض أن النسخ من الوورد يستخدم Tab
            if (cols.length >= 4) {
                await addDoc(collection(db, "students"), {
                    name: cols[0], birth: cols[1], id: cols[2], class: "السادس العلمي", section: "د"
                });
            }
        }
        alert("تم استيراد الطلاب بنجاح!");
        loadStudents();
    };

    // دالة عرض الطلاب
    window.loadStudents = async () => {
        const snap = await getDocs(collection(db, "students"));
        const body = document.getElementById('studentBody');
        body.innerHTML = "";
        snap.forEach(d => {
            const dt = d.data();
            body.innerHTML += `<tr>
                <td>${dt.name}</td><td>${dt.birth}</td><td>${dt.id}</td>
                <td>${dt.class} / ${dt.section}</td>
                <td><button onclick="deleteStudent('${d.id}')" style="background:red">حذف</button></td>
            </tr>`;
        });
    };
    loadStudents();
</script>
</body>
</html>
