<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تقارير الحضور</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f8f9fa; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 10px; margin-top: 10px; }
        .row > div { flex: 1; }
        select, input, button { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        .report-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .status-tag { padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
        .absent { background: #f8d7da; color: #721c24; }
        .excused { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="card">
    <h4>📋 التقرير اليومي</h4>
    <input type="date" id="dailyDate">
    <button onclick="dailyReport()" style="background:#28a745; color:white;">عرض غيابات اليوم</button>
</div>

<div class="card">
    <h4>🔍 سجل الطالب (بحث مرن)</h4>
    <input type="text" id="manualName" placeholder="أدخل اسم الطالب...">
    <hr>
    <select id="filterClass"><option value="">اختر الصف...</option></select>
    <select id="filterSection"><option value="">اختر الشعبة...</option></select>
    <select id="filterStudent"><option value="">اختر الطالب من القائمة...</option></select>
    
    <div class="row">
        <div><label>من:</label><input type="date" id="start"></div>
        <div><label>إلى:</label><input type="date" id="end"></div>
    </div>
    <button onclick="studentReport()" style="background:#007bff; color:white; margin-top:15px;">استخراج السجل</button>
</div>

<div id="reportResult" class="card"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ /* أضف الـ config الخاص بك هنا */ }));

    // تعيين تاريخ اليوم تلقائياً
    document.getElementById('dailyDate').valueAsDate = new Date();

    // 1. تقرير اليوم (تم إصلاح الزر)
    window.dailyReport = async () => {
        const date = document.getElementById('dailyDate').value;
        const resDiv = document.getElementById('reportResult');
        resDiv.innerHTML = "جاري البحث...";
        
        const snap = await getDocs(query(collection(db, "attendance"), where("date", "==", date)));
        let daily = {};
        snap.forEach(d => {
            const data = d.data();
            if(data.status !== "حاضر") {
                if(!daily[data.name]) daily[data.name] = { class: data.class, status: [] };
                daily[data.name].status.push(`${data.lesson}: ${data.status}`);
            }
        });

        resDiv.innerHTML = `<h4>غيابات يوم ${date}</h4>`;
        for(let name in daily) {
            resDiv.innerHTML += `<div class="report-item"><strong>${name} (${daily[name].class})</strong> <div>${daily[name].status.map(s => `<span class="status-tag ${s.includes('غائب')?'absent':'excused'}">${s}</span>`).join('')}</div></div>`;
        }
    };

    // 2. سجل الطالب (يدعم الاسم أو القوائم)
    window.studentReport = async () => {
        const manualName = document.getElementById('manualName').value;
        const selectName = document.getElementById('filterStudent').value;
        const name = manualName || selectName;
        
        if(!name) { alert("الرجاء كتابة الاسم أو اختياره من القائمة"); return; }
        // ... بقية منطق التقرير ...
    };
</script>
</body>
</html>
