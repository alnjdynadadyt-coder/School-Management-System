<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقرير الشامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        select, input, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #6f42c1; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h3>التقرير الشامل للطلاب</h3>
        <div class="controls">
            <select id="classSelect" onchange="loadSections()"><option value="">الصف</option></select>
            <select id="sectionSelect" onchange="loadStudents()"><option value="">الشعبة</option></select>
            <select id="studentSelect"><option value="all">الكل</option></select>
            <input type="date" id="dateFrom">
            <input type="date" id="dateTo">
            <button onclick="generateComprehensiveReport()" style="background: #6f42c1; color: white; border: none; cursor: pointer; grid-column: span 3;">عرض التقرير</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>اسم الطالب</th>
                    <th>أيام غياب</th>
                    <th>دروس غياب</th>
                    <th>أيام إجازة</th>
                    <th>دروس إجازة</th>
                </tr>
            </thead>
            <tbody id="reportTableBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. جلب الصفوف
        db.collection("students").get().then(snap => {
            let classes = new Set();
            snap.forEach(doc => { if(doc.data().class) classes.add(doc.data().class); });
            const classSelect = document.getElementById('classSelect');
            classes.forEach(c => classSelect.innerHTML += `<option value="${c}">${c}</option>`);
        });

        // 2. تحميل الشعب
        function loadSections() {
            const c = document.getElementById('classSelect').value;
            const secSelect = document.getElementById('sectionSelect');
            secSelect.innerHTML = '<option value="">الشعبة</option>';
            if (!c) return;
            db.collection("students").where("class", "==", c).get().then(snap => {
                let sections = new Set();
                snap.forEach(doc => { if(doc.data().section) sections.add(doc.data().section); });
                sections.forEach(s => secSelect.innerHTML += `<option value="${s}">${s}</option>`);
            });
        }

        // 3. تحميل الطلاب
        function loadStudents() {
            const c = document.getElementById('classSelect').value;
            const s = document.getElementById('sectionSelect').value;
            const stuSelect = document.getElementById('studentSelect');
            stuSelect.innerHTML = '<option value="all">الكل</option>';
            if (!c || !s) return;
            db.collection("students").where("class", "==", c).where("section", "==", s).get().then(snap => {
                snap.forEach(doc => stuSelect.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`);
            });
        }

        // 4. التقرير الشامل بمعادلة الـ 4 دروس
        async function generateComprehensiveReport() {
            const dFrom = document.getElementById('dateFrom').value;
            const dTo = document.getElementById('dateTo').value;
            const stuId = document.getElementById('studentSelect').value;
            
            if(!dFrom || !dTo) { alert("يرجى تحديد التاريخ"); return; }

            const attendSnap = await db.collection("attendance").get();
            const studentsSnap = await db.collection("students").get();
            let studentsData = {};

            // تهيئة بيانات الطلاب
            studentsSnap.forEach(doc => {
                if(stuId === "all" || doc.id === stuId) {
                    studentsData[doc.id] = { name: doc.data().name, absent: {}, leave: {} };
                }
            });

            // معالجة البيانات
            attendSnap.forEach(doc => {
                const parts = doc.id.split('_');
                const d = parts[0];
                if(d >= dFrom && d <= dTo) {
                    const data = doc.data().data || {};
                    Object.keys(data).forEach(sId => {
                        if(studentsData[sId]) {
                            let status = data[sId];
                            if(status === "غائب" || status === "مجاز") {
                                let type = status === "غائب" ? "absent" : "leave";
                                if(!studentsData[sId][type][d]) studentsData[sId][type][d] = 0;
                                studentsData[sId][type][d]++;
                            }
                        }
                    });
                }
            });

            // حساب النتائج وعرضها
            let html = "";
            for(let sId in studentsData) {
                let absDays = 0, absLessons = 0, leaveDays = 0, leaveLessons = 0;
                
                ["absent", "leave"].forEach(type => {
                    for(let d in studentsData[sId][type]) {
                        let count = studentsData[sId][type][d];
                        if(type === "absent") {
                            absDays += Math.floor(count / 4);
                            absLessons += (count % 4);
                        } else {
                            leaveDays += Math.floor(count / 4);
                            leaveLessons += (count % 4);
                        }
                    }
                });
                
                html += `<tr><td>${studentsData[sId].name}</td><td>${absDays}</td><td>${absLessons}</td><td>${leaveDays}</td><td>${leaveLessons}</td></tr>`;
            }
            document.getElementById('reportTableBody').innerHTML = html || "<tr><td colspan='5'>لا توجد بيانات للفترة المحددة</td></tr>";
        }
    </script>
</body>
</html>
