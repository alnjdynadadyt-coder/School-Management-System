<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور</title>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .student-row { background: #fff; padding: 12px; margin-top: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-action { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; margin: 0 2px; }
        .present { background: #d4edda; }
        .absent { background: #f8d7da; }
        .excused { background: #fff3cd; }
    </style>
</head>
<body>

<div class="card">
    <h3>تسجيل الغياب</h3>
    <input type="date" id="date">
    <select id="fClass"><option>الرابع العلمي</option><option>السادس العلمي</option></select>
    <select id="fSection"><option>أ</option><option>ب</option></select>
    <button onclick="fetchStudents()" style="width:100%; padding:10px; background:#007bff; color:white; border:none;">جلب القائمة</button>
</div>

<div id="studentList" class="card"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8",
        authDomain: "school-manager-d1865.firebaseapp.com",
        projectId: "school-manager-d1865",
        storageBucket: "school-manager-d1865.firebasestorage.app",
        messagingSenderId: "752295259069",
        appId: "1:752295259069:web:cb0824a579e714bb77c0d4"
    }));

    window.saveAttendance = async (studentName, status) => {
        const date = document.getElementById('date').value;
        const sClass = document.getElementById('fClass').value;
        // حفظ الحضور في قاعدة البيانات
        await setDoc(doc(db, "attendance", `${date}_${studentName}`), {
            name: studentName, status: status, date: date, class: sClass
        });
        alert("تم تسجيل: " + status);
    };

    window.fetchStudents = async () => {
        const sClass = document.getElementById('fClass').value;
        const sSection = document.getElementById('fSection').value;
        const q = query(collection(db, "students"), where("class", "==", sClass), where("section", "==", sSection));
        const snap = await getDocs(q);
        const listDiv = document.getElementById('studentList');
        listDiv.innerHTML = "";
        snap.forEach(d => {
            const name = d.data().name;
            listDiv.innerHTML += `<div class="student-row">${name} 
                <div>
                    <button class="btn-action present" onclick="saveAttendance('${name}', 'حاضر')">حاضر</button>
                    <button class="btn-action absent" onclick="saveAttendance('${name}', 'غائب')">غائب</button>
                    <button class="btn-action excused" onclick="saveAttendance('${name}', 'مجاز')">مجاز</button>
                </div></div>`;
        });
    };
</script>
</body>
</html>
