<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام التقارير الإداري المتكامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        .btn-green { background: #28a745; color: white; border: none; }
        .btn-blue { background: #007bff; color: white; border: none; }
        .btn-red { background: #dc3545; color: white; border: none; }
    </style>
</head>
<body>

<div class="card" style="border-right: 5px solid #dc3545;">
    <h3>⚠️ حذف السجلات المخصص</h3>
    <input type="date" id="delFrom">
    <input type="date" id="delTo">
    <select id="delClass"></select>
    <button class="btn-red" onclick="confirmDelete()">حذف السجلات المختارة</button>
</div>

<div class="card">
    <h3>📋 التقرير اليومي</h3>
    <input type="date" id="dailyDate">
    <button class="btn-green" onclick="renderDailyReport()">عرض تقرير اليوم</button>
</div>

<div class="card">
    <h3>🔍 التقرير الشامل</h3>
    <div style="display:flex; gap:10px;">
        <input type="date" id="start">
        <input type="date" id="end">
    </div>
    <select id="sClass"></select>
    <select id="sStudent"></select>
    <button class="btn-blue" onclick="renderFullReport()">استخراج التقرير وتصديره</button>
</div>

<div id="res" class="card"></div>

<script type="module">
    // هنا يتم دمج كود Firebase ومنطق المعالجة
    // سأقوم الآن بكتابة منطق تجميع "الغيابات" و "الإجازات" 
    // والمعادلة (4 دروس = 1 يوم) وتفعيل أزرار التصدير.
</script>

</body>
</html>
