<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور الآمن</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 900px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        select { padding: 5px; width: 100%; }
        button { padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3>📝 تسجيل الحضور اليومي (محمي)</h3>
    <input type="date" id="date">
    <input type="text" id="name" placeholder="اسم الطالب">
    <input type="text" id="cls" placeholder="الصف">
    <input type="text" id="sec" placeholder="الشعبة">

    <table>
        <tr>
            <th>الدرس</th>
            <th>الحالة</th>
        </tr>
        <tr><td>الدرس 1</td><td><select id="l1"><option>حاضر</option><option>غائب</option><option>مجاز</option></select></td></tr>
        <tr><td>الدرس 2</td><td><select id="l2"><option>حاضر</option><option>غائب</option><option>مجاز</option></select></td></tr>
        <tr><td>الدرس 3</td><td><select id="l3"><option>حاضر</option><option>غائب</option><option>مجاز</option></select></td></tr>
        <tr><td>الدرس 4</td><td><select id="l4"><option>حاضر</option><option>غائب</option><option>مجاز</option></select></td></tr>
        <tr><td>الدرس 5</td><td><select id="l5"><option>حاضر</option><option>غائب</option><option>مجاز</option></select></td></tr>
        <tr><td>الدرس 6</td><td><select id="l6"><option>حاضر</option><option>غائب</option><option>مجاز</option></select></td></tr>
    </table>
    <br>
    <button onclick="secureSave()">حفظ البيانات (يتطلب كلمة مرور)</button>
    <button onclick="window.location.href='index.html'" style="background:#6c757d;">عودة</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));
    const ADMIN_PASS = "12345"; // ضع هنا رقمك السري الخاص

    window.secureSave = async () => {
        const pass = prompt("يرجى إدخال كلمة المرور للتحكم في البيانات:");
        if (pass !== ADMIN_PASS) return alert("كلمة مرور خاطئة!");

        for(let i=1; i<=6; i++) {
            let status = document.getElementById('l'+i).value;
            if(status !== "حاضر") {
                await addDoc(collection(db, "attendance"), {
                    date: document.getElementById('date').value,
                    name: document.getElementById('name').value,
                    class: document.getElementById('cls').value,
                    section: document.getElementById('sec').value,
                    lesson: "الدرس " + i,
                    status: status
                });
            }
        }
        alert("تم الحفظ بنجاح!");
    };
</script>
</body>
</html>
