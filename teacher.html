<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الحضور</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        .status-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .btn-save { background: #007bff; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h3>تسجيل الحضور اليومي</h3>
        <div class="controls">
            <input type="date" id="datePicker">
            <select id="classSelect"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option></select>
            <select id="sectionSelect"><option>أ</option><option>ب</option><option>ج</option><option>د</option></select>
            <select id="lessonSelect"><option>الدرس الأول</option><option>الدرس الثاني</option><option>الدرس الثالث</option><option>الدرس الرابع</option><option>الدرس الخامس</option><option>الدرس السادس</option></select>
            <button onclick="loadStudentsForAttendance()" style="grid-column: span 2; background:#28a745; color:white; border:none; padding:10px; border-radius:8px;">جلب الأسماء</button>
        </div>
        <table>
            <thead><tr><th>اسم الطالب</th><th>الحالة</th></tr></thead>
            <tbody id="attendanceBody"></tbody>
        </table>
        <button id="saveBtn" class="btn-save" style="display:none;" onclick="saveAttendance()">إرسال الحضور</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865" };
        if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // الحماية
        window.onload = () => {
            const pass = prompt("🔐 كلمة مرور المدرس:");
            if (pass !== "Teacher123") { document.body.innerHTML = "<h1>❌ دخول مرفوض</h1>"; return; }
            document.getElementById('datePicker').valueAsDate = new Date();
        };

        // تبديل الألوان
        window.toggleStatus = (btn) => {
            if(btn.disabled) return;
            const states = ["حاضر", "غائب", "مجاز"];
            const colors = ["#28a745", "#dc3545", "#ffc107"];
            let idx = states.indexOf(btn.innerText);
            let next = (idx + 1) % 3;
            btn.innerText = states[next];
            btn.style.backgroundColor = colors[next];
        };

        // جلب البيانات
        window.loadStudentsForAttendance = () => {
            const cls = document.getElementById('classSelect').value;
            const sec = document.getElementById('sectionSelect').value;
            const lesson = document.getElementById('lessonSelect').value;
            const date = document.getElementById('datePicker').value;
            const docId = `${date}_${cls}_${sec}_${lesson}`;

            db.collection("attendance").doc(docId).get().then(doc => {
                const isLocked = doc.exists;
                db.collection("students").where("class", "==", cls).where("section", "==", sec).get().then(snap => {
                    const body = document.getElementById('attendanceBody'); body.innerHTML = "";
                    snap.forEach((student, index) => {
                        const status = isLocked ? doc.data().data[index] : "حاضر";
                        const color = status === "حاضر" ? "#28a745" : (status === "غائب" ? "#dc3545" : "#ffc107");
                        body.innerHTML += `<tr><td>${student.data().name}</td>
                        <td><button class="status-btn" style="background:${color}" ${isLocked ? 'disabled' : ''} onclick="toggleStatus(this)">${status}</button></td></tr>`;
                    });
                    document.getElementById('saveBtn').style.display = isLocked ? "none" : "block";
                    if(isLocked) alert("⚠️ هذا الدرس مقفل بالفعل!");
                });
            });
        };

        // الحفظ مع القفل
        window.saveAttendance = () => {
            const cls = document.getElementById('classSelect').value;
            const sec = document.getElementById('sectionSelect').value;
            const lesson = document.getElementById('lessonSelect').value;
            const date = document.getElementById('datePicker').value;
            const docId = `${date}_${cls}_${sec}_${lesson}`;
            
            const attendanceData = {};
            document.querySelectorAll('.status-btn').forEach((btn, i) => attendanceData[i] = btn.innerText);

            db.collection("attendance").doc(docId).set({ data: attendanceData }).then(() => {
                alert("✅ تم قفل وحفظ الحضور!");
                location.reload();
            });
        };
    </script>
</body>
</html>
