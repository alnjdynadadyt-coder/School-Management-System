<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة التقارير</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>
<button onclick="window.location.href='index.html'">⬅ العودة للرئيسية</button>
<div class="card">
    <h4>⚠️ أداة الحذف (مع فحص البيانات)</h4>
    <input type="date" id="delFrom"><input type="date" id="delTo">
    <select id="delClass"><option value="">الصف...</option></select>
    <select id="delSection"><option value="">الشعبة...</option></select>
    <button onclick="debugAndClear()" style="background:#dc3545; color:white; width:100%; padding:10px;">فحص ثم حذف</button>
</div>
<div class="card">
    <h4>📋 تقرير اليوم (مجمع)</h4>
    <input type="date" id="dailyDate">
    <button onclick="fetchDailyTable()" style="background:#28a745; color:white; width:100%;">عرض التقرير</button>
</div>
<div id="res" class="card"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    document.getElementById('dailyDate').value = new Date().toISOString().split('T')[0];

    // جلب الصفوف
    getDocs(collection(db, "students")).then(snap => {
        let classes = [...new Set(snap.docs.map(d => d.data().class))];
        classes.forEach(c => document.getElementById('delClass').innerHTML += `<option value="${c}">${c}</option>`);
    });

    window.debugAndClear = async () => {
        const from = document.getElementById('delFrom').value;
        const cls = document.getElementById('delClass').value;
        const snap = await getDocs(collection(db, "attendance"));
        let found = 0;
        snap.forEach(d => {
            const data = d.data();
            // عرض ما يراه النظام في "أدوات المطور" (F12 ثم Console)
            console.log("Database Record:", data.date, "|", data.class, "|", data.section);
            if(data.date >= from && data.class == cls) found++; 
        });
        alert("وجد النظام " + found + " سجل يطابق الصف والتاريخ. (افتح F12 ثم Console لرؤية البيانات).");
    };

    window.fetchDailyTable = async () => {
        const date = document.getElementById('dailyDate').value;
        const snap = await getDocs(collection(db, "attendance"));
        let report = {}; // لتجميع البيانات
        snap.forEach(d => {
            const data = d.data();
            if(data.date === date) {
                if(!report[data.name]) report[data.name] = {class: data.class, section: data.section, lessons: []};
                report[data.name].lessons.push(data.lesson + " (" + data.status + ")");
            }
        });
        let html = `<h4>تقرير ${date}</h4><table class="report-table"><tr><th>الطالب</th><th>الصف</th><th>الدروس/الحالة</th></tr>`;
        for(let name in report) {
            html += `<tr><td>${name}</td><td>${report[name].class}-${report[name].section}</td><td>${report[name].lessons.join('، ')}</td></tr>`;
        }
        document.getElementById('res').innerHTML = html + `</table>`;
    };
</script>
</body>
</html>
