<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقرير اليومي للغياب</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .absent { color: #dc3545; font-weight: bold; }
        .leave { color: #ffc107; font-weight: bold; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <h3>التقرير اليومي للغياب</h3>
        <input type="date" id="datePicker" onchange="loadDailyReport()">
        
        <div id="stats" style="margin: 20px 0; font-weight: bold;"></div>

        <table id="reportTable">
            <thead>
                <tr><th>اسم الطالب</th><th>الصف/الشعبة</th><th>الدروس</th></tr>
            </thead>
            <tbody id="reportBody"></tbody>
        </table>
        <button class="no-print" onclick="window.print()" style="margin-top:20px; padding:10px; width:100%;">طباعة التقرير (PDF)</button>
    </div>

    <script>
        const db = firebase.firestore();
        
        async function loadDailyReport() {
            const date = document.getElementById('datePicker').value;
            const reportBody = document.getElementById('reportBody');
            reportBody.innerHTML = "";
            
            // جلب كل سجلات الحضور لهذا اليوم
            const snap = await db.collection("attendance").where("date", "==", date).get(); // ملاحظة: تأكد من تخزين حقل التاريخ في كل مستند
            
            let studentsData = {};

            snap.forEach(doc => {
                const data = doc.data().data;
                for (let studentId in data) {
                    if (data[studentId] !== "حاضر") {
                        if (!studentsData[studentId]) {
                            studentsData[studentId] = { name: "...", classes: [] }; // سنحتاج ربط اسم الطالب
                        }
                        studentsData[studentId].classes.push(`${doc.data().lesson}: ${data[studentId]}`);
                    }
                }
            });

            // عرض البيانات في الجدول...
        }
    </script>
</body>
</html>
