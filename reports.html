<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>النظام النهائي</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table th, .table td { border: 1px solid #ccc; padding: 10px; text-align: center; }
        input, button { padding: 10px; width: 100%; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h3>⚠️ حذف السجلات (بين تاريخين)</h3>
    <input type="date" id="delFrom"><input type="date" id="delTo">
    <button onclick="clearData()" style="background:#d9534f; color:white;">تنفيذ الحذف</button>
</div>

<div class="card">
    <h3>📋 تقرير الغياب المجمع</h3>
    <input type="date" id="reportDate">
    <button onclick="fetchReport()" style="background:#5cb85c; color:white;">عرض التقرير</button>
</div>

<div id="displayArea" class="card"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    // الحذف: يعتمد على التاريخ فقط لضمان النجاح
    window.clearData = async () => {
        if(prompt("كلمة السر:") !== "1234") return;
        const f = document.getElementById('delFrom').value, t = document.getElementById('delTo').value;
        const snap = await getDocs(collection(db, "attendance"));
        let batch = writeBatch(db), count = 0;
        snap.forEach(doc => {
            const d = doc.data();
            if(d.date >= f && d.date <= t) { batch.delete(doc.ref); count++; }
        });
        if(count > 0) { await batch.commit(); alert("تم حذف " + count + " سجل."); location.reload(); }
        else alert("لا توجد سجلات في هذا التاريخ.");
    };

    // التقرير: يجمع الحالات لكل طالب
    window.fetchReport = async () => {
        const date = document.getElementById('reportDate').value;
        const snap = await getDocs(collection(db, "attendance"));
        let report = {};
        snap.forEach(doc => {
            const d = doc.data();
            if(d.date === date && d.status !== "حاضر") {
                if(!report[d.name]) report[d.name] = {cls: d.class, list: []};
                report[d.name].list.push(d.lesson + ": " + d.status);
            }
        });
        let h = `<table class="table"><tr><th>الطالب</th><th>الصف</th><th>الغياب/الإجازات</th></tr>`;
        for(let n in report) h += `<tr><td>${n}</td><td>${report[n].cls}</td><td>${report[n].list.join('، ')}</td></tr>`;
        document.getElementById('displayArea').innerHTML = h + "</table>";
    };
</script>
</body>
</html>
