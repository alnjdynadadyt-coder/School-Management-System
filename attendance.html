<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل الحضور - العودة للنسخة المستقرة</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; }
        .card { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        select, input { width: 100%; padding: 10px; margin: 4px 0; border: 1px solid #ddd; border-radius: 4px; }
        .student-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 5px; border-bottom: 1px solid #eee; }
        .status-btn { padding: 5px 12px; border: none; border-radius: 4px; cursor: pointer; width: 80px; }
        .present { background: #d4edda; } .absent { background: #f8d7da; } .excused { background: #fff3cd; }
    </style>
</head>
<body>

<div class="card">
    <input type="date" id="date">
    <select id="fClass"><option>الرابع العلمي</option><option>الخامس العلمي</option><option>السادس العلمي</option></select>
    <select id="fSection"><option>أ</option><option>ب</option><option>ج</option></select>
    <button onclick="fetchAttendance()" style="background:#007bff; color:white; border:none; padding:12px; width:100%;">جلب السجل</button>
</div>

<div id="studentList" class="card"></div>
<button id="saveBtn" style="background:#28a745; color:white; padding:10px; width:100%; border:none; display:none;" onclick="saveChanges()">حفظ التعديلات</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ /* ضع بياناتك هنا كما كانت في الملف القديم */ }));
    document.getElementById('date').valueAsDate = new Date();

    window.fetchAttendance = async () => {
        const listDiv = document.getElementById('studentList');
        const cls = document.getElementById('fClass').value;
        const sec = document.getElementById('fSection').value;
        listDiv.innerHTML = "جاري الجلب...";
        
        const q = query(collection(db, "students"), where("class", "==", cls), where("section", "==", sec));
        const snap = await getDocs(q);
        
        listDiv.innerHTML = "";
        snap.forEach(d => {
            listDiv.innerHTML += `<div class="student-row"><span class="s-name">${d.data().name}</span> <button class="status-btn present" onclick="toggle(this)">حاضر</button></div>`;
        });
        document.getElementById('saveBtn').style.display = "block";
    };

    window.toggle = (btn) => {
        if (btn.innerText === "حاضر") { btn.innerText = "غائب"; btn.className = "status-btn absent"; }
        else if (btn.innerText === "غائب") { btn.innerText = "مجاز"; btn.className = "status-btn excused"; }
        else { btn.innerText = "حاضر"; btn.className = "status-btn present"; }
    };

    window.saveChanges = async () => {
        const rows = document.querySelectorAll('.student-row');
        for (let row of rows) {
            const name = row.querySelector('.s-name').innerText;
            const status = row.querySelector('button').innerText;
            await setDoc(doc(db, "attendance", `${document.getElementById('date').value}_${name}`), { 
                name, status, date: document.getElementById('date').value, 
                class: document.getElementById('fClass').value 
            });
        }
        alert("تم الحفظ بنجاح!");
    };
</script>
</body>
</html>
