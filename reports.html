<script type="module">
    // ... (نفس إعدادات الاستيراد والاتصال بـ db السابقة) ...

    // دالة الحذف المحمية بكلمة مرور
    window.clearAllData = async () => {
        const password = prompt("⚠️ هذا الإجراء سيحذف جميع السجلات. يرجى إدخال كلمة مرور الإدارة:");
        if (password !== "1234") { // يمكنك تغيير 1234 لأي كلمة مرور تريدها
            alert("كلمة مرور خاطئة! تم إلغاء الحذف.");
            return;
        }
        const snap = await getDocs(collection(db, "attendance"));
        snap.forEach(async (d) => await deleteDoc(doc(db, "attendance", d.id)));
        alert("تم مسح السجلات بنجاح!");
        location.reload();
    };

    // دالة عرض التقرير اليومي المجمعة
    window.fetchDaily = async () => {
        const date = document.getElementById('dailyDate').value;
        const snap = await getDocs(collection(db, "attendance"));
        let dailyReport = {};

        snap.forEach(d => {
            const data = d.data();
            if(data.date === date && data.status !== "حاضر") {
                if(!dailyReport[data.name]) {
                    dailyReport[data.name] = { class: data.class || "غير محدد", sec: data.section || "-", lessons: [] };
                }
                dailyReport[data.name].lessons.push(data.lesson + ": " + data.status);
            }
        });

        let html = `<h4>غيابات ${date}</h4>`;
        for(let name in dailyReport) {
            html += `<div class="report-item">
                        <div><strong>${name}</strong> <small>(${dailyReport[name].class} - ${dailyReport[name].sec})</small></div>
                        <div>${dailyReport[name].lessons.map(l => `<span class="tag absent">${l}</span>`).join('')}</div>
                     </div>`;
        }
        document.getElementById('res').innerHTML = html;
    };

    // ... (اترك دالة fetchStudentReport كما هي، فهي تعمل بشكل جميل الآن) ...
</script>
