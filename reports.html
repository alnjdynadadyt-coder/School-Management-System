<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة التقارير</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f0f2f5; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .report-table th, .report-table td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>
<button onclick="window.location.href='index.html'">⬅ العودة للرئيسية</button>
<div class="card">
    <h4>⚠️ أداة الحذف</h4>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
        <input type="date" id="delFrom"><input type="date" id="delTo">
        <select id="delClass" onchange="updateDelSections()"><option value="">اختر الصف...</option></select>
        <select id="delSection"><option value="">اختر الشعبة...</option></select>
    </div>
    <button onclick="clearAllData()" style="background:#dc3545; color:white; width:100%; padding:10px; margin-top:5px;">تنفيذ الحذف المشروط</button>
</div>
<div class="card">
    <h4>📋 تقرير الغياب والإجازات اليومي</h4>
    <input type="date" id="dailyDate">
    <button onclick="fetchDailyTable()" style="background:#28a745; color:white; width:100%; padding:10px;">عرض التقرير</button>
</div>
<div id="res" class="card"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    let studentsDB = [];
    async function init() {
        const snap = await getDocs(collection(db, "students"));
        studentsDB = snap.docs.map(d => d.data());
        let classes = [...new Set(studentsDB.map(s => s.class))].sort();
        classes.forEach(c => document.getElementById('delClass').innerHTML += `<option value="${c}">${c}</option>`);
    }
    init();

    window.updateDelSections = () => {
        const cls = document.getElementById('delClass').value;
        const secs = [...new Set(studentsDB.filter(s => s.class == cls).map(s => s.section))].sort();
        document.getElementById('delSection').innerHTML = '<option value="">اختر الشعبة...</option>';
        secs.forEach(s => document.getElementById('delSection').innerHTML += `<option value="${s}">${s}</option>`);
    };

    window.clearAllData = async () => {
        if(prompt("كلمة المرور:") !== "1234") return alert("خطأ!");
        const from = document.getElementById('delFrom').value, to = document.getElementById('delTo').value;
        const cls = document.getElementById('delClass').value, sec = document.getElementById('delSection').value;
        const snap = await getDocs(collection(db, "attendance"));
        const batch = writeBatch(db);
        let count = 0;
        snap.forEach(d => {
            const data = d.data();
            // مقارنة مرنة: نقوم بتحويل القيم لنصوص وإزالة الفراغات
            if(data.date >= from && data.date <= to && String(data.class||'').trim() == cls.trim() && String(data.section||'').trim() == sec.trim()) {
                batch.delete(d.ref); count++;
            }
        });
        if(count > 0 && confirm(`تم العثور على ${count} سجل. حذف؟`)) { await batch.commit(); location.reload(); }
        else alert("لا توجد سجلات تطابق الصف والشعبة المختارين في هذه الفترة.");
    };

    window.fetchDailyTable = async () => {
        const date = document.getElementById('dailyDate').value;
        const snap = await getDocs(collection(db, "attendance"));
        let report = {};
        snap.forEach(d => {
            const data = d.data();
            // تصفية: عرض الغياب والإجازة فقط
            if(data.date === date && (data.status === "غائب" || data.status === "إجازة")) {
                if(!report[data.name]) report[data.name] = {cls: data.class, sec: data.section, lessons: []};
                report[data.name].lessons.push(data.lesson + " (" + data.status + ")");
            }
        });
        let html = `<table class="report-table"><tr><th>الطالب</th><th>الصف</th><th>تفاصيل الغياب/الإجازة</th></tr>`;
        for(let name in report) {
            html += `<tr><td>${name}</td><td>${report[name].cls}-${report[name].sec}</td><td>${report[name].lessons.join('، ')}</td></tr>`;
        }
        document.getElementById('res').innerHTML = html + `</table>`;
    };
</script>
</body>
</html>
