<select id="lessonSelect">
    <option>الدرس الأول</option><option>الدرس الثاني</option><option>الدرس الثالث</option>
    <option>الدرس الرابع</option><option>الدرس الخامس</option><option>الدرس السادس</option>
</select>

<script>
    // دالة الحفظ مع القفل
    window.saveAttendance = () => {
        const docId = `${datePicker.value}_${classSelect.value}_${sectionSelect.value}_${lessonSelect.value}`;
        const attendanceData = {};
        // جمع حالات الطلاب
        document.querySelectorAll('.status-btn').forEach((btn, index) => {
            attendanceData[index] = btn.innerText;
        });

        db.collection("attendance").doc(docId).set({
            data: attendanceData,
            locked: true,
            timestamp: new Date()
        }).then(() => {
            alert("✅ تم قفل وحفظ البيانات بنجاح!");
            location.reload();
        });
    };

    // دالة الجلب مع التحقق من القفل
    window.loadStudentsForAttendance = () => {
        const docId = `${datePicker.value}_${classSelect.value}_${sectionSelect.value}_${lessonSelect.value}`;
        
        db.collection("attendance").doc(docId).get().then(doc => {
            if (doc.exists) {
                // القفل مفعل: عرض البيانات فقط
                alert("⚠️ هذا الدرس مقفل! لا يمكنك التعديل.");
                renderStudents(doc.data().data, true); 
            } else {
                // لا يوجد قفل: فتح للتسجيل
                renderStudents(null, false);
            }
        });
    };
</script>
