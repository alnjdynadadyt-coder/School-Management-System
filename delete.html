<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حذف السجلات المخصص</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        select, input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; border: none; color: white; font-weight: bold; }
        .btn-delete { background: #d9534f; }
        .btn-back { background: #6c757d; }
    </style>
</head>
<body>

<div class="card">
    <h3>🗑️ حذف سجلات الحضور</h3>
    <label>التاريخ:</label>
    <input type="date" id="dateFilter">
    <label>الصف:</label>
    <select id="classFilter">
        <option value="all">الكل</option>
        <option value="الرابع العلمي">الرابع العلمي</option>
        <option value="الخامس العلمي">الخامس العلمي</option>
    </select>
    <label>اسم الطالب (اختياري - لحذف فردي):</label>
    <input type="text" id="nameFilter" placeholder="اتركه فارغاً لحذف الصف كاملاً">
    
    <button id="btnDelete" class="btn-delete" onclick="deleteTargetedData()">تنفيذ الحذف</button>
    <button class="btn-back" onclick="window.location.href='index.html'">عودة للرئيسية</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, writeBatch, query, where } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyAu6Lmi46t0eoympoDmHQ9UkMlSCVxxfr8", projectId: "school-manager-d1865", appId: "1:752295259069:web:cb0824a579e714bb77c0d4" }));

    window.deleteTargetedData = async () => {
        if(prompt("كلمة السر:") !== "1234") return alert("كلمة سر خاطئة!");
        
        const dateVal = document.getElementById('dateFilter').value;
        const classVal = document.getElementById('classFilter').value;
        const nameVal = document.getElementById('nameFilter').value.trim();

        if(!dateVal) return alert("يرجى تحديد التاريخ");

        const btn = document.getElementById('btnDelete');
        btn.disabled = true;
        btn.innerText = "جاري البحث...";

        // جلب البيانات بناءً على التاريخ
        const q = query(collection(db, "attendance"), where("date", "==", dateVal));
        const snap = await getDocs(q);
        
        let batch = writeBatch(db), count = 0;
        
        snap.forEach(doc => {
            const d = doc.data();
            const matchClass = (classVal === "all" || d.class === classVal);
            const matchName = (nameVal === "" || d.name === nameVal);
            
            if(matchClass && matchName) {
                batch.delete(doc.ref);
                count++;
            }
        });

        if(count > 0) {
            if(confirm(`سيتم حذف ${count} سجل. هل أنت متأكد؟`)) {
                await batch.commit();
                alert(`تم حذف ${count} سجل بنجاح.`);
                location.reload();
            } else {
                btn.disabled = false; btn.innerText = "تنفيذ الحذف";
            }
        } else {
            alert("لا توجد سجلات تطابق خياراتك.");
            btn.disabled = false; btn.innerText = "تنفيذ الحذف";
        }
    };
</script>
</body>
</html>
