<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التقرير اليومي الموثوق</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .table th, .table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .g { color: red; font-weight: bold; }
        .m { color: #856404; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>📋 تقرير الغيابات والإجازات اليومي</h3>
    <input type="date" id="reportDate">
    <button onclick="generateReport()" style="background:#007bff; color:white; padding:10px; border:none; width:100%;">استخراج التقرير لهذا اليوم</button>
</div>

<div id="reportArea" class="card">
    <div id="tableContainer"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ /* ضع بياناتك هنا */ }));

    window.generateReport = async () => {
        const date = document.getElementById('reportDate').value;
        const listDiv = document.getElementById('tableContainer');
        listDiv.innerHTML = "جاري تجميع البيانات...";

        const q = query(collection(db, "attendance"), where("date", "==", date));
        const snap = await getDocs(q);
        
        let report = {};
        snap.forEach(d => {
            const data = d.data();
            // لا نعرض الحاضرين في التقرير اليومي، فقط الغائب والمجاز
            if (data.status !== "حاضر") {
                if (!report[data.name]) report[data.name] = { cls: data.class, lessons: [] };
                report[data.name].lessons.push(`${data.lesson} (${data.status === 'غائب' ? 'غ' : 'م'})`);
            }
        });

        if (Object.keys(report).length === 0) {
            listDiv.innerHTML = "لا توجد حالات غياب أو إجازة مسجلة لهذا التاريخ.";
            return;
        }

        let html = `<table class="table"><tr><th>اسم الطالب</th><th>الصف</th><th>الدروس المسجلة</th></tr>`;
        for (let name in report) {
            html += `<tr><td>${name}</td><td>${report[name].cls}</td><td>${report[name].lessons.join(' - ')}</td></tr>`;
        }
        listDiv.innerHTML = html + "</table>";
    };
</script>
</body>
</html>
