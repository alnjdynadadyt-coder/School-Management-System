<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حذف السجلات</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* نفس تنسيقاتك الجميلة */
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        select, input { padding: 10px; margin: 5px 0; width: 100%; border-radius: 8px; border: 1px solid #ccc; }
        button { padding: 12px; width: 100%; border: none; border-radius: 8px; background: #dc3545; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h3>🗑️ حذف سجلات الحضور</h3>
        <select id="classSelect" onchange="loadSections()"><option value="">اختر الصف</option></select>
        <select id="sectionSelect" onchange="loadStudents()"><option value="">اختر الشعبة</option></select>
        <select id="studentSelect"><option value="all">الكل</option></select>
        <input type="date" id="dateFrom">
        <input type="date" id="dateTo">
        <input type="password" id="adminPass" placeholder="أدخل كلمة مرور الإدارة">
        <button onclick="performDelete()">حذف السجلات المحددة</button>
    </div>

    <script>
        const db = firebase.firestore();
        const CORRECT_PASS = "12345"; // غيرها لكلمة مرورك الخاصة

        async function performDelete() {
            const pass = document.getElementById('adminPass').value;
            if (pass !== CORRECT_PASS) { alert("كلمة المرور غير صحيحة!"); return; }

            const dFrom = document.getElementById('dateFrom').value;
            const dTo = document.getElementById('dateTo').value;
            const stuId = document.getElementById('studentSelect').value;
            
            if(!dFrom || !dTo) { alert("حدد الفترة الزمنية"); return; }

            if (!confirm("⚠️ تحذير: سيتم حذف البيانات نهائياً. هل أنت متأكد؟")) return;

            // جلب سجلات الحضور في الفترة المحددة
            const snapshot = await db.collection("attendance").get();
            
            const batch = db.batch();
            let count = 0;

            snapshot.forEach(doc => {
                const docDate = doc.id.split('_')[0];
                if (docDate >= dFrom && docDate <= dTo) {
                    let data = doc.data().data || {};
                    
                    if (stuId === "all") {
                        // حذف سجلات الصف/الشعبة كاملاً (إذا أردت حذف المستند ليوم كامل)
                        batch.delete(doc.ref);
                        count++;
                    } else if (data[stuId]) {
                        // حذف طالب معين فقط من سجل اليوم
                        delete data[stuId];
                        batch.update(doc.ref, { data: data });
                        count++;
                    }
                }
            });

            await batch.commit();
            alert("تمت العملية بنجاح! تم معالجة " + count + " سجل.");
            location.reload();
        }
        
        // أضف دوال loadSections و loadStudents هنا بنفس منطق صفحة التقارير
    </script>
</body>
</html>
